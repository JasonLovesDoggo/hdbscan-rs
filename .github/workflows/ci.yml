name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown
      - name: Get CPU model for cache key
        id: cpu
        run: echo "model=$(grep -m1 'model name' /proc/cpuinfo | cut -d':' -f2 | xargs)" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust-${{ steps.cpu.outputs.model }}"
      - name: Check
        run: cargo check --all-features
      - name: Test
        run: cargo test
      - name: Check Python feature
        run: cargo check --features python
      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown --features wasm --no-default-features
      - name: Clippy
        if: matrix.rust == 'stable'
        run: cargo clippy -- -D warnings
      - name: Format check
        if: matrix.rust == 'stable'
        run: cargo fmt -- --check

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Get CPU model for cache key
        id: cpu
        run: echo "model=$(grep -m1 'model name' /proc/cpuinfo | cut -d':' -f2 | xargs)" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-rust-${{ steps.cpu.outputs.model }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - name: Install maturin and numpy
        run: pip install maturin numpy
      - name: Build and install
        run: PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 maturin build --release && pip install target/wheels/*.whl
      - name: Run Python tests
        run: python tests/test_python.py
